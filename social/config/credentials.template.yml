# Social Media Platforms Credentials Template
# This is a template file. DO NOT put real credentials here.
# Real credentials are stored as GitHub Secrets and injected during build.

facebook:
    access_token: YOUR_FACEBOOK_ACCESS_TOKEN_HERE
    id_account: [act_ACCOUNT_1, act_ACCOUNT_2, act_ACCOUNT_3]
    id_business: YOUR_BUSINESS_ID_HERE
    app_secret: YOUR_APP_SECRET_HERE
    app_id: YOUR_APP_ID_HERE

linkedin:
    client_id: YOUR_LINKEDIN_CLIENT_ID_HERE
    client_secret: YOUR_LINKEDIN_CLIENT_SECRET_HERE

google:
    manager_id: [YOUR_MANAGER_ID_HERE]
    config_file: social/platforms/google/google-ads-YOUR_ACCOUNT_ID.yml
    version: v19
